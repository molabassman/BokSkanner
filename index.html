<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Bokskanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
      padding-bottom: 150px;
    }

    h2 {
      margin: 6px 0 8px 0;
      font-size: 22px;
    }

    input {
      font-size: 16px;
      padding: 8px;
      margin: 4px 0;
      width: 100%;
      box-sizing: border-box;
    }

    #videoWrap {
      position: relative;
      width: 100%;
      margin-top: 8px;
    }

    video {
      width: 100%;
      border: 2px solid #333;
      display: block;
    }

    #ocrBox {
      position: absolute;
      left: 22%;
      top: 38%;
      width: 56%;
      height: 13%;
      border: 3px solid red;
      box-sizing: border-box;
      pointer-events: none;
    }

    .status {
      font-size: 16px;
      margin-top: 8px;
      padding: 8px;
      background: #eee;
    }

    .big {
      font-size: 22px;
      font-weight: bold;
      word-break: break-all;
    }

    #bottomButtons {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background: white;
      border-top: 2px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      z-index: 10;
    }

    button {
      font-size: 18px;
      padding: 14px 8px;
      width: 100%;
      box-sizing: border-box;
    }

    #ocrButton {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>Bokskanner</h2>

  <input id="scannerName" placeholder="Namn/enhet, t.ex. AA eller iPad 1">
  <input id="pin" placeholder="PIN-kod" type="password">

  <div id="videoWrap">
    <video id="video" playsinline></video>
    <div id="ocrBox"></div>
  </div>

  <div class="status">
    Senast: <span id="last" class="big">–</span><br>
    Antal: <span id="count">0</span><br>
    Status: <span id="status">Starta kameran längst ned</span>
  </div>

  <canvas id="ocrCanvas" style="display:none;"></canvas>

  <div id="bottomButtons">
    <button onclick="startCamera()">Starta kamera</button>
    <button onclick="stopCamera()">Pausa</button>
    <button id="ocrButton" onclick="readOcr()">Skanna OCR</button>
    <button onclick="scanBarcodeOnce()">Skanna streckkod</button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0baZLvVG7AbzFTkiqKHAyudRXbMNBFjwXHLHteyVcot7Sdb0DJLMLUGojp3p8wT4/exec";

    let codeReader;
    let selectedDeviceId = null;
    let count = 0;
    let lastScan = "";
    let lastScanTime = 0;
    let isSending = false;
    let cameraStarted = false;

    async function startCamera() {
      const scannerName = document.getElementById("scannerName").value.trim();
      const pin = document.getElementById("pin").value.trim();

      if (!scannerName || !pin) {
        setStatus("Skriv namn/enhet och PIN först");
        return;
      }

      setStatus("Startar kamera...");

      try {
        codeReader = new ZXing.BrowserMultiFormatReader();

        const devices = await codeReader.listVideoInputDevices();
        selectedDeviceId = devices[0].deviceId;

        const backCamera = devices.find(device =>
          device.label.toLowerCase().includes("back") ||
          device.label.toLowerCase().includes("rear") ||
          device.label.toLowerCase().includes("environment")
        );

        if (backCamera) {
          selectedDeviceId = backCamera.deviceId;
        }

        await codeReader.decodeFromVideoDevice(
          selectedDeviceId,
          "video",
          () => {}
        );

        cameraStarted = true;
        setStatus("Kameran är igång. Tryck Skanna OCR.");
      } catch (err) {
        setStatus("Kamerafel: " + err.message);
      }
    }

    function stopCamera() {
      if (codeReader) {
        codeReader.reset();
      }

      cameraStarted = false;
      setStatus("Pausad");
    }

    async function readOcr() {
      if (!cameraStarted) {
        setStatus("Starta kameran först");
        return;
      }

      const video = document.getElementById("video");
      const canvas = document.getElementById("ocrCanvas");
      const ctx = canvas.getContext("2d");

      if (!video.videoWidth || !video.videoHeight) {
        setStatus("Kameran är inte redo");
        return;
      }

      const sx = video.videoWidth * 0.22;
      const sy = video.videoHeight * 0.38;
      const sw = video.videoWidth * 0.56;
      const sh = video.videoHeight * 0.13;

      canvas.width = sw;
      canvas.height = sh;

      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

      setStatus("Läser OCR...");

      try {
        const result = await Tesseract.recognize(canvas, "eng", {
          tessedit_char_whitelist: "0123456789 "
        });

        const text = result.data.text;
        const code = extractLibraryCode(text);

        if (!code) {
          setStatus("Hittade ingen 11-siffrig kod");
          return;
        }

        await onScanSuccess(code, "OCR");
      } catch (err) {
        setStatus("OCR-fel: " + err.message);
      }
    }

    async function scanBarcodeOnce() {
      if (!cameraStarted) {
        setStatus("Starta kameran först");
        return;
      }

      setStatus("Letar streckkod...");

      try {
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.CODE_39,
          ZXing.BarcodeFormat.CODE_93,
          ZXing.BarcodeFormat.CODABAR,
          ZXing.BarcodeFormat.ITF,
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.UPC_A,
          ZXing.BarcodeFormat.UPC_E
        ]);

        const singleReader = new ZXing.BrowserMultiFormatReader(hints);

        const result = await singleReader.decodeOnceFromVideoDevice(
          selectedDeviceId,
          "video"
        );

        singleReader.reset();

        await onScanSuccess(cleanBarcode(result.getText()), "streckkod");
      } catch (err) {
        setStatus("Ingen streckkod hittad");
      }
    }

    function extractLibraryCode(text) {
      const onlyDigits = String(text).replace(/\D/g, "");

      const match = onlyDigits.match(/800\d{8}/);

      if (match) {
        return match[0];
      }

      return null;
    }

    function cleanBarcode(value) {
      return String(value)
        .trim()
        .replace(/\s+/g, "");
    }

    async function onScanSuccess(barcode, source) {
      const now = Date.now();

      if (!barcode) return;

      if (barcode === lastScan && now - lastScanTime < 3000) {
        setStatus("Samma kod ignorerad: " + barcode);
        return;
      }

      if (isSending) return;

      lastScan = barcode;
      lastScanTime = now;
      isSending = true;

      document.getElementById("last").textContent = barcode;
      setStatus("Skickar " + source + "...");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            isbn: barcode,
            scanner: document.getElementById("scannerName").value.trim(),
            pin: document.getElementById("pin").value.trim()
          })
        });

        count++;
        document.getElementById("count").textContent = count;
        setStatus("Sparad: " + barcode);

        if (navigator.vibrate) navigator.vibrate(100);
        beep();
      } catch (err) {
        setStatus("Fel: " + err.message);
      }

      setTimeout(() => {
        isSending = false;
      }, 800);
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function beep() {
      const audioCtx = new AudioContext();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.frequency.value = 880;
      gain.gain.value = 0.1;

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.08);
    }
  </script>
</body>
</html>
