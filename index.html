<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Bokskanner ZXing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      max-width: 600px;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      margin: 6px 0;
      width: 100%;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      border: 2px solid #333;
      margin-top: 12px;
    }

    .status {
      font-size: 18px;
      margin-top: 12px;
      padding: 10px;
      background: #eee;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>Bokskanner ZXing</h2>

  <input id="scannerName" placeholder="Namn/enhet, t.ex. APN eller iPad 1">
  <input id="pin" placeholder="PIN-kod" type="password">

  <button onclick="startScanner()">Starta skanning</button>
  <button onclick="stopScanner()">Pausa</button>

  <div class="status">
    Senast: <span id="last" class="big">–</span><br>
    Antal: <span id="count">0</span><br>
    Status: <span id="status">Inte startad</span>
  </div>

  <video id="video" playsinline></video>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0baZLvVG7AbzFTkiqKHAyudRXbMNBFjwXHLHteyVcot7Sdb0DJLMLUGojp3p8wT4/exec";

    let codeReader;
    let count = 0;
    let lastScan = "";
    let lastScanTime = 0;
    let isSending = false;

    async function startScanner() {
      const scannerName = document.getElementById("scannerName").value.trim();
      const pin = document.getElementById("pin").value.trim();

      if (!scannerName || !pin) {
        setStatus("Skriv namn/enhet och PIN först");
        return;
      }

      setStatus("Startar kamera...");

      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.CODE_93,
        ZXing.BarcodeFormat.CODABAR,
        ZXing.BarcodeFormat.ITF,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E
      ]);

      codeReader = new ZXing.BrowserMultiFormatReader(hints);

      const devices = await codeReader.listVideoInputDevices();

      let selectedDeviceId = devices[0].deviceId;

      const backCamera = devices.find(device =>
        device.label.toLowerCase().includes("back") ||
        device.label.toLowerCase().includes("rear") ||
        device.label.toLowerCase().includes("environment")
      );

      if (backCamera) {
        selectedDeviceId = backCamera.deviceId;
      }

      codeReader.decodeFromVideoDevice(
        selectedDeviceId,
        "video",
        async (result, err) => {
          if (result) {
            await onScanSuccess(result.getText());
          }
        }
      );

      setStatus("Skanning igång");
    }

    function stopScanner() {
      if (codeReader) {
        codeReader.reset();
        setStatus("Pausad");
      }
    }

    async function onScanSuccess(decodedText) {
      const now = Date.now();
      const barcode = cleanBarcode(decodedText);

      if (!barcode) return;

      if (barcode === lastScan && now - lastScanTime < 3000) {
        return;
      }

      if (isSending) return;

      lastScan = barcode;
      lastScanTime = now;
      isSending = true;

      document.getElementById("last").textContent = barcode;
      setStatus("Skickar...");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            isbn: barcode,
            scanner: document.getElementById("scannerName").value.trim(),
            pin: document.getElementById("pin").value.trim()
          })
        });

        count++;
        document.getElementById("count").textContent = count;
        setStatus("Sparad");

        if (navigator.vibrate) navigator.vibrate(100);
        beep();

      } catch (err) {
        setStatus("Fel: " + err.message);
      }

      setTimeout(() => {
        isSending = false;
      }, 800);
    }

    function cleanBarcode(value) {
      return String(value)
        .trim()
        .replace(/\s+/g, " ");
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function beep() {
      const audioCtx = new AudioContext();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.frequency.value = 880;
      gain.gain.value = 0.1;

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.08);
    }
  </script>
</body>
</html>
