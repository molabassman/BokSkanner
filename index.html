<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Bokskanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      max-width: 600px;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      margin: 6px 0;
      width: 100%;
      box-sizing: border-box;
    }

    #videoWrap {
      position: relative;
      width: 100%;
    }

    video {
      width: 100%;
      border: 2px solid #333;
      margin-top: 12px;
    }

    #ocrBox {
      position: absolute;
      left: 22%;
      top: 38%;
      width: 56%;
      height: 13%;
      border: 3px solid red;
      box-sizing: border-box;
      pointer-events: none;
    }

    .status {
      font-size: 18px;
      margin-top: 12px;
      padding: 10px;
      background: #eee;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h2>Bokskanner</h2>

  <input id="scannerName" placeholder="Namn/enhet, t.ex. A1 eller iPad 1">
  <input id="pin" placeholder="PIN-kod" type="password">

  <button onclick="startScanner()">Starta skanning</button>
  <button onclick="stopScanner()">Pausa</button>
  <button onclick="readOcr()">Läs siffror med OCR</button>

  <div class="status">
    Senast: <span id="last" class="big">–</span><br>
    Antal: <span id="count">0</span><br>
    Status: <span id="status">Inte startad</span>
  </div>

  <div id="videoWrap">
    <video id="video" playsinline></video>
    <div id="ocrBox"></div>
  </div>

  <canvas id="ocrCanvas" style="display:none;"></canvas>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0baZLvVG7AbzFTkiqKHAyudRXbMNBFjwXHLHteyVcot7Sdb0DJLMLUGojp3p8wT4/exec";

    let codeReader;
    let count = 0;
    let lastScan = "";
    let lastScanTime = 0;
    let isSending = false;

    async function startScanner() {
      const scannerName = document.getElementById("scannerName").value.trim();
      const pin = document.getElementById("pin").value.trim();

      if (!scannerName || !pin) {
        setStatus("Skriv namn/enhet och PIN först");
        return;
      }

      setStatus("Startar kamera...");

      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.CODE_93,
        ZXing.BarcodeFormat.CODABAR,
        ZXing.BarcodeFormat.ITF,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E
      ]);

      codeReader = new ZXing.BrowserMultiFormatReader(hints);

      const devices = await codeReader.listVideoInputDevices();
      let selectedDeviceId = devices[0].deviceId;

      const backCamera = devices.find(device =>
        device.label.toLowerCase().includes("back") ||
        device.label.toLowerCase().includes("rear") ||
        device.label.toLowerCase().includes("environment")
      );

      if (backCamera) {
        selectedDeviceId = backCamera.deviceId;
      }

      codeReader.decodeFromVideoDevice(
        selectedDeviceId,
        "video",
        async (result, err) => {
          if (result) {
            await onScanSuccess(cleanBarcode(result.getText()), "streckkod");
          }
        }
      );

      setStatus("Skanning igång");
    }

    function stopScanner() {
      if (codeReader) {
        codeReader.reset();
        setStatus("Pausad");
      }
    }

    async function readOcr() {
      const video = document.getElementById("video");
      const canvas = document.getElementById("ocrCanvas");
      const ctx = canvas.getContext("2d");

      if (!video.videoWidth || !video.videoHeight) {
        setStatus("Kameran är inte redo");
        return;
      }

      const sx = video.videoWidth * 0.22;
      const sy = video.videoHeight * 0.38;
      const sw = video.videoWidth * 0.56;
      const sh = video.videoHeight * 0.13;

      canvas.width = sw;
      canvas.height = sh;

      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

      setStatus("Läser text med OCR...");

      try {
        const result = await Tesseract.recognize(canvas, "eng", {
          tessedit_char_whitelist: "0123456789 "
        });

        const text = result.data.text;
        const code = extractLibraryCode(text);

        if (!code) {
          setStatus("Hittade ingen 11-siffrig kod");
          return;
        }

        await onScanSuccess(code, "OCR");

      } catch (err) {
        setStatus("OCR-fel: " + err.message);
      }
    }

    function extractLibraryCode(text) {
      const onlyDigits = String(text).replace(/\D/g, "");

      // Letar efter 11 siffror som börjar med 800
      const match = onlyDigits.match(/800\d{8}/);

      if (match) {
        return match[0];
      }

      return null;
    }

    function cleanBarcode(value) {
      return String(value)
        .trim()
        .replace(/\s+/g, "");
    }

    async function onScanSuccess(barcode, source) {
      const now = Date.now();

      if (!barcode) return;

      if (barcode === lastScan && now - lastScanTime < 3000) {
        return;
      }

      if (isSending) return;

      lastScan = barcode;
      lastScanTime = now;
      isSending = true;

      document.getElementById("last").textContent = barcode;
      setStatus("Skickar " + source + "...");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            isbn: barcode,
            scanner: document.getElementById("scannerName").value.trim(),
            pin: document.getElementById("pin").value.trim()
          })
        });

        count++;
        document.getElementById("count").textContent = count;
        setStatus("Sparad: " + barcode);

        if (navigator.vibrate) navigator.vibrate(100);
        beep();

      } catch (err) {
        setStatus("Fel: " + err.message);
      }

      setTimeout(() => {
        isSending = false;
      }, 800);
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function beep() {
      const audioCtx = new AudioContext();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.frequency.value = 880;
      gain.gain.value = 0.1;

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.08);
    }
  </script>
</body>
</html>
